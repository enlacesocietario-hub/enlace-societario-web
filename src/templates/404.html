<section class="error-404" style="padding: var(--space-20) 0; min-height: 60vh; display: flex; align-items: center;">
    <div class="container" style="max-width: 800px; text-align: center;">
        <div class="error-image-container"
            style="margin-bottom: var(--space-12); position: relative; display: inline-block;">
            <img src="/images/illustration_404_societario.png" alt="Página no encontrada - Enlace Societario"
                style="max-width: 100%; height: auto; border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); border: 1px solid rgba(0,0,0,0.05);">
        </div>

        <h1
            style="font-size: var(--text-5xl); color: var(--color-primary); margin-bottom: var(--space-4); font-weight: 800; letter-spacing: -0.02em;">
            ERROR 404
        </h1>

        <p
            style="font-size: var(--text-xl); color: var(--color-text-body); margin-bottom: var(--space-12); max-width: 600px; margin-left: auto; margin-right: auto; line-height: 1.5;">
            La página que estás buscando no existe o fue modificada.
        </p>

        <div style="margin-bottom: var(--space-12);">
            <a href="/" class="btn btn-primary" style="padding: 1rem 3rem; font-size: 1.1rem; border-radius: 50px;">
                VOLVER AL INICIO
            </a>
        </div>

        <div style="padding-top: var(--space-8); border-top: 1px solid var(--color-border);">
            <p style="color: var(--color-text-body); font-size: var(--text-base);">
                Si creés que esto es un error, podés <a href="/contacto"
                    style="color: var(--color-accent); font-weight: 600; text-decoration: none;">contactarnos</a>.
            </p>
        </div>
    </div>
</section>
