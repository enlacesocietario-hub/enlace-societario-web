<article class="blog-post">
    <header class="post-header">
        <div class="container">
            <span class="category">{{category}}</span>
            <h1>{{title}}</h1>
            <div class="meta">
                <span class="author">Por {{author}}</span> • <time datetime="{{date_iso}}">{{date_readable}}</time>
            </div>
        </div>
    </header>
    
    <div class="post-content container">
        {{post_body}}
    </div>
</article>

<section class="cta-section section">
    <div class="container">
        <h2>¿Necesitás asesoramiento sobre este tema?</h2>
        <a href="#contacto" class="btn">Solicitar Asesoramiento</a>
    </div>
</section>
